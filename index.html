<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizz Buzz!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <main>
        <div class="container">
            <div class="card mt-4 text-center">
                <div class="card-header">
                    <h1 class="card-title text-uppercase">Benvenuti su FizzBuzz!</h1>
                    <p class="card-text">Questo è un programma che stampa i numeri da 1 a 100,
                        ma per i multipli di 3 stampa “Fizz” al posto del numero
                        e per i multipli di 5 stampa "Buzz".</p>
                </div>
                <div class="card-body">
                    <h2 class="text-uppercase">Risultato:</h2>
                    <p id="output">

                    </p>
                </div>
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./main.js"></script>
</body>

</html>
